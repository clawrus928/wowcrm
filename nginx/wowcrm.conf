# nginx site for crm.wowmac.com
# Place at /etc/nginx/conf.d/wowcrm.conf, then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crm.wowmac.com
#
# Note: wowcrm has its own JWT login, so basic_auth is intentionally OFF.
# If you want an extra layer (e.g. before going public), uncomment the two
# auth_basic lines below.

server {
    listen 80;
    server_name crm.wowmac.com;

    client_max_body_size 10M;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # auth_basic "wowcrm";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
