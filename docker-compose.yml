services:
  app:
    image: ghcr.io/clawrus928/wowcrm:latest
    container_name: wowcrm
    restart: unless-stopped
    ports:
      - "80:8080"
    volumes:
      - /var/lib/wowcrm:/data
    environment:
      JWT_SECRET: ${JWT_SECRET:-CHANGE-ME-IN-PRODUCTION}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-wowcrm}
